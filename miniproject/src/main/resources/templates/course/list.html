<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/main-layout}">
<div layout:fragment="content">
    <h3>Danh mục khóa học</h3>

    <form th:action="@{/course/list}" method="get" class="row g-3 mb-4">
        <div class="col-md-4">
            <select name="level" class="form-select">
                <option value="">-- Chọn trình độ --</option>
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>
        </div>
        <div class="col-md-4">
            <input type="number" name="maxFee" class="form-control" placeholder="Học phí tối đa">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Lọc</button>
        </div>
    </form>

    <table class="table table-hover" th:if="${not #lists.isEmpty(courses)}">
        <thead>
        <tr>
            <th>Mã</th>
            <th>Tên khóa</th>
            <th>Học phí</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${courses}">
            <td th:text="${c.id}"></td>
            <td><a th:href="@{/course/detail/{id}(id=${c.id})}" th:text="${c.name}"></a></td>
            <td th:text="${#numbers.formatDecimal(c.fee, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
            <td>
                <a th:href="@{/course/edit/{id}(id=${c.id})}" class="btn btn-sm btn-warning">Sửa</a>
                <form th:action="@{/course/delete/{id}(id=${c.id})}" method="post" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Xóa?')">Hủy</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(courses)}" class="alert alert-warning">
        Hiện chưa có lớp học phù hợp với trình độ này.
    </div>
</div>
</html>
